<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Dynamic-Key Vigenère Cipher</title>
    <style>
      body {
          margin: 0;
          padding: 40px;
          background: #f4f6f9;
          font-family: "Ubuntu Mono", monospace;
          color: #222;
          display: flex;
          justify-content: center;
      }
      
      .container {
          display: flex;
          gap: 30px;
          flex-wrap: wrap;
          max-width: 1000px;
          width: 100%;
      }
      
      .card {
          flex: 1;
          min-width: 320px;
          background: white;
          border-radius: 14px;
          padding: 25px;
          box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      }
      
      h2 {
          margin-top: 0;
          color: #2c3e50;
          text-align: center;
          border-bottom: 2px solid #4a90e2;
          padding-bottom: 10px;
      }
      
      form {
          display: flex;
          flex-direction: column;
          gap: 15px;
      }
      
      input[type="text"] {
          padding: 12px 14px;
          border: 2px solid #d6dbe2;
          border-radius: 8px;
          font-size: 16px;
          transition: 0.25s;
          outline: none;
      }
      
      input[type="text"]:focus {
          border-color: #4a90e2;
          box-shadow: 0 0 8px rgba(74,144,226,0.25);
      }
      
      .output-label {
          font-weight: bold;
          color: #555;
      }
      
      .output-box {
          min-height: 50px;
          padding: 12px;
          border-radius: 8px;
          background: #eef5ff;
          border: 2px solid #cdddf7;
          font-size: 18px;
          font-weight: bold;
          letter-spacing: 1px;
          word-break: break-word;
      }
      textarea {
          width: 100%;
          min-height: 100px;
          padding: 12px 14px;
          border: 2px solid #d6dbe2;
          border-radius: 8px;
          font-size: 16px;
          font-family: inherit;
          resize: vertical;
          box-sizing: border-box;
          transition: border-color 0.25s, box-shadow 0.25s;
          outline: none;
      }
      
      textarea:focus {
          border-color: #4a90e2;
          box-shadow: 0 0 8px rgba(74, 144, 226, 0.25);
      }
      @media (max-width: 700px) {
          body {
              padding: 20px;
          }
      
          .container {
              flex-direction: column;
          }
      }
    </style>
  </head>
  <body>
    <div class="container">
    <div class="card">
        <h2>Encrypt</h2>
        <form>
            <textarea id="plaintext-in" placeholder="Enter Plaintext"></textarea>
            <input type="text" id="key-encrypt" placeholder="Enter Key"></textarea>

            <div class="output-label">Ciphertext</div>
            <div id="ciphertext-out" class="output-box"></div>
        </form>
    </div>

    <div class="card">
        <h2>Decrypt</h2>
        <form>
            <textarea id="ciphertext-in" placeholder="Enter Ciphertext"></textarea>
            <input type="text" id="key-decrypt" placeholder="Enter Key"></textarea>

            <div class="output-label">Plaintext</div>
            <div id="plaintext-out" class="output-box"></div>
        </form>
    </div>
  </div>
  <script>
    const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    function CaesarShift(input, shift) {
      let output = "";
    
      for (let i = 0; i < input.length; i++) {
        let letter_index = alphabet.indexOf(input[i]);
    
        if (letter_index === -1) {
          output += input[i];
          continue;
        }
    
        let shifted_index = (letter_index + shift + 26) % 26;
        output += alphabet[shifted_index];
      }
    
      return output;
    }
    
    
    function SingleColumnar(input, key) {
        const order = key
            .split("")
            .map((char, index) => ({ char, index }))
            .sort((a, b) =>
                a.char === b.char
                    ? a.index - b.index 
                    : a.char.localeCompare(b.char)
            );
    
        return order.map(x => input[x.index]).join("");
    }
    
    function Vigenere(input,key){
      let output = "";
      for(let i = 0; i<key.length;i++){
        output+=CaesarShift(input[i],alphabet.indexOf(key[i]));
      }
      
      console.log("Encrypted text " + input + " with key " + key + " and output "+ output);
      return output;
    }
    
    function VigenereDecrypt(input,key){
      let output = "";
      for (let i = 0; i < input.length; i++) {
        let shift = alphabet.indexOf(key[i % key.length]);
        output += CaesarShift(input[i], -shift);
      }
      
      console.log("Decrypted text " + input + " with key " + key + " and output "+ output);
      return output;
    }
    function GenerateNewKey(input,key){
      transposedKey = SingleColumnar(input,key);
      let shift = 0;
      for(let k=0; k<key.length; k++){
        shift += alphabet.indexOf(input[k]);
      }
      shift = shift % 26;
      newKey = CaesarShift(transposedKey,shift);
      console.log("Key " + input + " was transposed with plaintext segment " + key + " to " + transposedKey + " with shift " + shift + " and resulted in " + newKey);
      return newKey;
    }
    function splitIntoGroups(str, size) {
        const result = [];
        for (let i = 0; i < str.length; i += size) {
            result.push(str.slice(i, i + size));
        }
        return result;
    }
    
    function DynamicKeyVigenereEncrypt(input,key){
      if(key.length == 0 || input.length == 0){return "";}
      let keyLength = key.length;
      let inputArray = splitIntoGroups(input, keyLength);  
      let outputArray = [];
      
      console.log("Received text:" + inputArray.join("|")) 
      let newKey = "";
      let shift = 0;
      let excessText = false;
      if(input.length % keyLength != 0){excessText = true}
      if(!excessText){
        newKey = key;
        
        outputArray.push(Vigenere(inputArray[0],newKey));
        if(inputArray.length > 1){
          for(let i = 1; i<inputArray.length; i++){
            newKey = GenerateNewKey(key,inputArray[i-1]);
            outputArray.push(Vigenere(inputArray[i],newKey));
            key=newKey;
          }
        }
      }
      else{
        if(inputArray.length == 1){
          let truncatedKey = key.slice(0,inputArray[0].length);
          return Vigenere(input,truncatedKey);
        }
        else{
          let normalStrings = inputArray.length - 1;
          outputArray.push(Vigenere(inputArray[0],key));
          if(normalStrings > 1){
            for(let i = 1; i<normalStrings; i++){
              newKey = GenerateNewKey(key,inputArray[i-1]);
              outputArray.push(Vigenere(inputArray[i],newKey));
              key=newKey;
            }
          }
          let truncatedKey = newKey.slice(0,inputArray[normalStrings].length);
          outputArray.push(Vigenere(inputArray[normalStrings],truncatedKey));
        }
      }
      return outputArray.join("");
    }
    function DynamicKeyVigenereDecrypt(input,key){
      if(key.length == 0 || input.length == 0){return "";}
      let keyLength = key.length;
      let inputArray = splitIntoGroups(input, keyLength); 
      console.log("Received text:" + inputArray.join("|")) 
      let outputArray = [];
      let newKey = "";
      let shift = 0;
      let excessText = false;
      if(input.length % keyLength != 0){excessText = true; console.log("Excess Text detected")}
      if(!excessText){
        newKey = key;
        
        outputArray.push(VigenereDecrypt(inputArray[0],newKey));
        if(inputArray.length > 1){
          for(let i = 1; i<inputArray.length; i++){
            newKey = GenerateNewKey(key,outputArray[i-1]);
            outputArray.push(VigenereDecrypt(inputArray[i],newKey));
            key=newKey;
          }
        }
      }
      else{
        if(inputArray.length == 1){
          let truncatedKey = key.slice(0,inputArray[0].length);
          console.log(input,truncatedKey);
          return VigenereDecrypt(input,truncatedKey);
        }
        else{
          let normalStrings = inputArray.length - 1;
          outputArray.push(VigenereDecrypt(inputArray[0],key));
          if(normalStrings > 1){
            for(let i = 1; i<normalStrings; i++){
              newKey = GenerateNewKey(key,outputArray[i-1]);
              outputArray.push(VigenereDecrypt(inputArray[i],newKey));
              key=newKey;
              console.log("hi");
            }
          }
          console.log("hi2");
          let truncatedKey = newKey.slice(0,inputArray[normalStrings].length);
          outputArray.push(VigenereDecrypt(inputArray[normalStrings],truncatedKey));
        }
      }
      return outputArray.join("");
    }
    
    function CleanInput(input) {
      return input.replace(/[^a-zA-Z]/g, "").toUpperCase();
    }
    
    const input_box_encrypt = document.getElementById("plaintext-in");
    const key_box_encrypt = document.getElementById("key-encrypt");
    const output_box_encrypt = document.getElementById("ciphertext-out");
    
    function updateOutputEncryption() {
        output_box_encrypt.textContent = DynamicKeyVigenereEncrypt(
            CleanInput(input_box_encrypt.value),
            CleanInput(key_box_encrypt.value)
        );
    }
    
    input_box_encrypt.addEventListener("input", updateOutputEncryption);
    key_box_encrypt.addEventListener("input", updateOutputEncryption);
    
    const input_box_decrypt = document.getElementById("ciphertext-in");
    const key_box_decrypt = document.getElementById("key-decrypt");
    const output_box_decrypt = document.getElementById("plaintext-out");
    
    function updateOutputDecryption() {
        output_box_decrypt.textContent = DynamicKeyVigenereDecrypt(
            CleanInput(input_box_decrypt.value),
            CleanInput(key_box_decrypt.value)
        );
    }
    console.log(DynamicKeyVigenereEncrypt("CRYPTOLOGY","MATH"))
    input_box_decrypt.addEventListener("input", updateOutputDecryption);
    key_box_decrypt.addEventListener("input", updateOutputDecryption);
  </script>
  </body>
</html>
